<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="apple-touch-icon" href="logo.png">
  <title>BAND-MAID Tour History Map</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

  <!-- Leaflet.markercluster -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.Default.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/leaflet.markercluster.min.js"></script>

  <style>
    :root {
      --gold: #c8a96e;
      --gold-dim: #a0814a;
      --bg: #0d0d0f;
      --surface: #16161a;
      --surface2: #1e1e24;
      --border: #2a2a35;
      --text: #e8e4dc;
      --text-dim: #8a8590;
      --red: #c94040;
      --font-display: 'Cinzel', serif;
      --font-body: 'Raleway', sans-serif;
    }

    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Raleway:wght@300;400;500;600&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      overflow: hidden;
    }

    /* ── HEADER ── */
    #header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 1000;
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 10px 20px;
      background: linear-gradient(180deg, #0d0d0fee 80%, transparent);
      border-bottom: 1px solid var(--border);
    }

    #header .logo-wrap {
      display: flex;
      flex-direction: column;
      line-height: 1;
    }

    #header .logo-main {
      font-family: var(--font-display);
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    #header .logo-sub {
      font-family: var(--font-body);
      font-size: 0.65rem;
      font-weight: 300;
      letter-spacing: 0.35em;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-top: 2px;
    }

    #header .divider {
      width: 1px;
      height: 36px;
      background: var(--border);
    }

    /* Filter controls */
    #controls {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      flex: 1;
    }

    .ctrl-label {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-dim);
      white-space: nowrap;
    }

    select, input[type=range] {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 0.78rem;
      padding: 4px 8px;
      border-radius: 3px;
      outline: none;
      cursor: pointer;
    }

    select:hover, select:focus {
      border-color: var(--gold-dim);
    }

    #stat-bar {
      margin-left: auto;
      display: flex;
      gap: 16px;
      font-size: 0.7rem;
      white-space: nowrap;
    }

    .stat {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      line-height: 1.2;
    }

    .stat-val {
      font-family: var(--font-display);
      font-size: 1.05rem;
      color: var(--gold);
      font-weight: 600;
    }

    .stat-lbl {
      color: var(--text-dim);
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    /* ── MAP ── */
    #map {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 1;
    }

    /* ── POPUP ── */
    .leaflet-popup-content-wrapper {
      background: var(--surface) !important;
      border: 1px solid var(--border) !important;
      border-radius: 4px !important;
      box-shadow: 0 8px 32px #000a !important;
      padding: 0 !important;
      min-width: 260px;
      max-width: 320px;
    }

    .leaflet-popup-tip-container { display: none; }
    .leaflet-popup-close-button { color: var(--text-dim) !important; top: 8px !important; right: 8px !important; font-size: 16px !important; }
    .leaflet-popup-close-button:hover { color: var(--gold) !important; }
    .leaflet-popup-content { margin: 0 !important; width: auto !important; }

    .pop-header {
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      padding: 12px 36px 12px 14px;
    }

    .pop-venue {
      font-family: var(--font-display);
      font-size: 0.9rem;
      color: var(--gold);
      letter-spacing: 0.04em;
      line-height: 1.3;
    }

    .pop-location {
      font-size: 0.7rem;
      color: var(--text-dim);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-top: 3px;
    }

    .pop-body {
      padding: 10px 14px;
      font-size: 0.8rem;
    }

    .shows-list { list-style: none; }

    .show-item {
      padding: 6px 0;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.15s;
    }

    .show-item:last-child { border-bottom: none; }

    .show-item:hover .show-date { color: var(--gold); }

    .show-date {
      font-family: var(--font-display);
      font-size: 0.78rem;
      color: var(--text);
      transition: color 0.15s;
    }

    .show-tour {
      font-size: 0.68rem;
      color: var(--gold-dim);
      letter-spacing: 0.08em;
      margin-top: 1px;
    }

    .show-meta {
      display: flex;
      gap: 8px;
      margin-top: 3px;
      font-size: 0.68rem;
      color: var(--text-dim);
    }

    .show-setlist {
      font-size: 0.66rem;
      color: var(--text-dim);
      margin-top: 4px;
      line-height: 1.5;
      display: none;
    }

    .show-item.expanded .show-setlist { display: block; }

    .setlist-pill {
      display: inline-block;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 1px 5px;
      margin: 1px 2px 1px 0;
      font-size: 0.62rem;
      color: var(--text-dim);
      line-height: 1.4;
    }

    .song-opener { border-color: var(--gold-dim); color: var(--gold-dim); }
    .song-closer { border-color: var(--red); color: #e06060; }

    .show-links {
      display: flex;
      gap: 8px;
      margin-top: 6px;
    }

    .show-links a {
      font-size: 0.65rem;
      color: var(--gold-dim);
      text-decoration: none;
      letter-spacing: 0.08em;
      border-bottom: 1px solid var(--border);
      padding-bottom: 1px;
      transition: color 0.15s, border-color 0.15s;
    }

    .show-links a:hover { color: var(--gold); border-color: var(--gold); }

    /* ── CLUSTER STYLES ── */
    .marker-cluster-small,
    .marker-cluster-medium,
    .marker-cluster-large {
      background-clip: padding-box;
    }

    .marker-cluster-small div,
    .marker-cluster-medium div,
    .marker-cluster-large div {
      font-family: var(--font-display) !important;
      font-weight: 600;
      font-size: 0.8rem;
      color: #0d0d0f !important;
    }

    .marker-cluster-small { background-color: rgba(200, 169, 110, 0.3) !important; }
    .marker-cluster-small div { background-color: rgba(200, 169, 110, 0.85) !important; }
    .marker-cluster-medium { background-color: rgba(200, 169, 110, 0.2) !important; }
    .marker-cluster-medium div { background-color: rgba(200, 169, 110, 0.75) !important; }
    .marker-cluster-large { background-color: rgba(201, 64, 64, 0.25) !important; }
    .marker-cluster-large div { background-color: rgba(201, 64, 64, 0.75) !important; }

    /* ── LEGEND ── */
    #legend {
      position: fixed;
      bottom: 24px;
      left: 16px;
      z-index: 1000;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 10px 14px;
      font-size: 0.68rem;
      min-width: 140px;
    }

    #legend .leg-title {
      font-family: var(--font-display);
      font-size: 0.7rem;
      color: var(--gold);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .leg-row {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 5px;
      color: var(--text-dim);
    }

    .leg-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ── LOADING ── */
    #loading {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      transition: opacity 0.4s;
    }

    #loading.hidden { opacity: 0; pointer-events: none; }

    .load-title {
      font-family: var(--font-display);
      font-size: 1.5rem;
      color: var(--gold);
      letter-spacing: 0.15em;
    }

    .load-sub {
      font-size: 0.7rem;
      color: var(--text-dim);
      letter-spacing: 0.3em;
      text-transform: uppercase;
    }

    .spinner {
      width: 32px; height: 32px;
      border: 2px solid var(--border);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── ATTRIBUTION override ── */
    .leaflet-control-attribution {
      background: rgba(13,13,15,0.75) !important;
      color: var(--text-dim) !important;
      font-size: 0.6rem !important;
    }
    .leaflet-control-attribution a { color: var(--gold-dim) !important; }

    /* zoom controls */
    .leaflet-bar a {
      background: var(--surface) !important;
      color: var(--gold) !important;
      border-color: var(--border) !important;
    }
    .leaflet-bar a:hover { background: var(--surface2) !important; }
  </style>
</head>
<body>

<div id="loading">
  <div class="load-title">BAND-MAID</div>
  <div class="load-sub">Tour History Map</div>
  <div class="spinner"></div>
</div>

<div id="header">
  <div class="logo-wrap">
    <span class="logo-main">BAND-MAID</span>
    <span class="logo-sub">Tour History Map</span>
  </div>
  <div class="divider"></div>
  <div id="controls">
    <span class="ctrl-label">Tour</span>
    <select id="filter-tour"><option value="">All Tours</option></select>
    <span class="ctrl-label">Country</span>
    <select id="filter-country"><option value="">All Countries</option></select>
    <span class="ctrl-label">Year</span>
    <select id="filter-year"><option value="">All Years</option></select>
  </div>
  <div id="stat-bar">
    <div class="stat"><span class="stat-val" id="stat-shows">–</span><span class="stat-lbl">Shows</span></div>
    <div class="stat"><span class="stat-val" id="stat-venues">–</span><span class="stat-lbl">Venues</span></div>
    <div class="stat"><span class="stat-val" id="stat-countries">–</span><span class="stat-lbl">Countries</span></div>
  </div>
</div>

<div id="map"></div>

<div id="legend">
  <div class="leg-title">Legend</div>
  <div class="leg-row"><div class="leg-dot" style="background:#c8a96e"></div> Japan</div>
  <div class="leg-row"><div class="leg-dot" style="background:#6eb5c8"></div> Asia / Pacific</div>
  <div class="leg-row"><div class="leg-dot" style="background:#6ec887"></div> North America</div>
  <div class="leg-row"><div class="leg-dot" style="background:#c86e6e"></div> Europe</div>
  <div class="leg-row"><div class="leg-dot" style="background:#b06ec8"></div> Other</div>
</div>

<script>
const DATA_URL = 'https://drivetimebm.github.io/BAND-MAID_gpt/okyuji/okyuji.json';

// Country → region color
function regionColor(country) {
  if (country === 'JP') return '#c8a96e';
  const asia = ['CN','TW','HK','KR','SG','TH','PH','MY','ID','VN','IN','AU','NZ'];
  if (asia.includes(country)) return '#6eb5c8';
  const na = ['US','CA','MX'];
  if (na.includes(country)) return '#6ec887';
  const eu = ['GB','DE','FR','NL','BE','ES','IT','SE','NO','DK','FI','CH','AT','PL','CZ','HU','IE','PT','RU'];
  if (eu.includes(country)) return '#c86e6e';
  return '#b06ec8';
}

function makeIcon(color) {
  return L.divIcon({
    className: '',
    html: `<svg width="14" height="14" viewBox="0 0 14 14" xmlns="http://www.w3.org/2000/svg">
      <circle cx="7" cy="7" r="5" fill="${color}" fill-opacity="0.85" stroke="#0d0d0f" stroke-width="1.5"/>
      <circle cx="7" cy="7" r="2" fill="#fff" fill-opacity="0.5"/>
    </svg>`,
    iconSize: [14, 14],
    iconAnchor: [7, 7],
    popupAnchor: [0, -10]
  });
}

// Group shows by lat/lon key
function groupByVenue(shows) {
  const map = {};
  for (const s of shows) {
    const key = `${s.Latitude.toFixed(4)},${s.Longitude.toFixed(4)}`;
    if (!map[key]) map[key] = { lat: s.Latitude, lon: s.Longitude, venue: s.Venue, city: s.City, country: s.Country, shows: [] };
    map[key].shows.push(s);
  }
  return Object.values(map);
}

function buildPopup(group) {
  const color = regionColor(group.country);
  let html = `
    <div class="pop-header">
      <div class="pop-venue">${group.venue}</div>
      <div class="pop-location">${group.city} · ${group.country}</div>
    </div>
    <div class="pop-body">
      <ul class="shows-list">`;

  const sorted = [...group.shows].sort((a,b) => b.SetDate.localeCompare(a.SetDate));
  for (const s of sorted) {
    const songs = s.SetlistDelimited ? s.SetlistDelimited.split('/') : [];
    const pills = songs.map(song => {
      let cls = 'setlist-pill';
      if (song === s.Opener) cls += ' song-opener';
      else if (song === s.Closer) cls += ' song-closer';
      return `<span class="${cls}">${song}</span>`;
    }).join('');

    html += `
      <li class="show-item" onclick="this.classList.toggle('expanded')">
        <div class="show-date">${s.SetDate}</div>
        ${s.Tour ? `<div class="show-tour">${s.Tour}</div>` : ''}
        <div class="show-meta">
          <span>🎵 ${s.NumberOfSongs || '?'} songs</span>
          ${s.Opener ? `<span>▶ ${s.Opener}</span>` : ''}
        </div>
        <div class="show-setlist">${pills}</div>
        <div class="show-links">
          ${s.URL ? `<a href="${s.URL}" target="_blank" rel="noopener">setlist.fm ↗</a>` : ''}
          <a href="${s.Map}" target="_blank" rel="noopener">maps ↗</a>
        </div>
      </li>`;
  }

  html += `</ul></div>`;
  return html;
}

// ── INIT ──
const map = L.map('map', {
  center: [30, 15],
  zoom: 3,
  zoomControl: true,
  preferCanvas: true
});

// Dark tile layer (CartoDB Dark Matter)
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/">CARTO</a>',
  subdomains: 'abcd',
  maxZoom: 19
}).addTo(map);

let allShows = [];
let clusterLayer = null;

function updateStats(shows) {
  const venues = new Set(shows.map(s => `${s.Latitude.toFixed(4)},${s.Longitude.toFixed(4)}`));
  const countries = new Set(shows.map(s => s.Country));
  document.getElementById('stat-shows').textContent = shows.length;
  document.getElementById('stat-venues').textContent = venues.size;
  document.getElementById('stat-countries').textContent = countries.size;
}

function renderMarkers(shows) {
  if (clusterLayer) map.removeLayer(clusterLayer);

  clusterLayer = L.markerClusterGroup({
    maxClusterRadius: 40,
    showCoverageOnHover: false,
    spiderfyOnMaxZoom: true
  });

  const groups = groupByVenue(shows);
  for (const g of groups) {
    const color = regionColor(g.country);
    const marker = L.marker([g.lat, g.lon], { icon: makeIcon(color) });
    marker.bindPopup(buildPopup(g), { maxWidth: 340, maxHeight: 420 });
    clusterLayer.addLayer(marker);
  }

  clusterLayer.addTo(map);
  updateStats(shows);
}

function applyFilters() {
  const tour = document.getElementById('filter-tour').value;
  const country = document.getElementById('filter-country').value;
  const year = document.getElementById('filter-year').value;

  const filtered = allShows.filter(s => {
    if (tour && s.Tour !== tour) return false;
    if (country && s.Country !== country) return false;
    if (year && !s.SetDate.startsWith(year)) return false;
    return true;
  });

  renderMarkers(filtered);
}

function populateFilters(shows) {
  const tours = [...new Set(shows.map(s => s.Tour).filter(Boolean))].sort();
  const countries = [...new Set(shows.map(s => s.Country))].sort();
  const years = [...new Set(shows.map(s => s.SetDate.slice(0,4)))].sort((a,b) => b-a);

  const tSel = document.getElementById('filter-tour');
  const cSel = document.getElementById('filter-country');
  const ySel = document.getElementById('filter-year');

  tours.forEach(t => { const o = document.createElement('option'); o.value = t; o.textContent = t; tSel.appendChild(o); });
  countries.forEach(c => { const o = document.createElement('option'); o.value = c; o.textContent = c; cSel.appendChild(o); });
  years.forEach(y => { const o = document.createElement('option'); o.value = y; o.textContent = y; ySel.appendChild(o); });

  [tSel, cSel, ySel].forEach(s => s.addEventListener('change', applyFilters));
}

// Fetch and render
fetch(DATA_URL)
  .then(r => r.json())
  .then(data => {
    allShows = data.filter(s => s.Latitude && s.Longitude);
    populateFilters(allShows);
    renderMarkers(allShows);
    document.getElementById('loading').classList.add('hidden');
  })
  .catch(err => {
    console.error(err);
    document.getElementById('loading').innerHTML = '<div class="load-title" style="color:#c94040">Load Error</div><div class="load-sub">Could not fetch show data</div>';
  });
</script>
</body>
</html>
